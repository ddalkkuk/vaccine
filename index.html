<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 아기 예방접종 계산기</title>
<style>
  :root{
    --ink:#2b2620;
    --paper:#fbf7f0;
    --card:#ffffff;
    --line:#e8e0d2;
    --sub:#8a7f6d;
    --red:#e0533d;
    --red-soft:#fbe9e5;
    --blue:#3d6ee0;
    --blue-soft:#e5ecfb;
    --green:#2f9e6a;
    --amber:#e0a53d;
    --amber-soft:#fbf3e0;
    --shadow:0 1px 3px rgba(80,60,30,.08),0 8px 24px rgba(80,60,30,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","맑은 고딕",system-ui,sans-serif;
    background:var(--paper);color:var(--ink);
    line-height:1.5;font-size:16px;
    padding-bottom:80px;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 16px}

  /* ── 헤더 ── */
  header{padding:22px 0 8px;text-align:center}
  .brand{font-size:20px;font-weight:800;letter-spacing:-.5px}
  .brand .heart{color:var(--red)}
  .madeby{font-size:12px;color:var(--sub);margin-top:2px}
  .madeby b{color:var(--amber)}

  /* ── 출생일 입력 ── */
  .birth{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:16px;margin-top:14px;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:12px;
  }
  .birth label{font-size:14px;font-weight:700;white-space:nowrap}
  .birth input{
    flex:1;border:1.5px solid var(--line);border-radius:12px;
    padding:10px 12px;font-size:16px;font-family:inherit;background:var(--paper);
    color:var(--ink);
  }
  .birth input:focus{outline:none;border-color:var(--amber)}

  /* ── 탭 ── */
  .tabs{
    position:fixed;bottom:0;left:0;right:0;z-index:20;
    background:rgba(251,247,240,.95);backdrop-filter:blur(8px);
    border-top:1px solid var(--line);
    display:flex;max-width:520px;margin:0 auto;
  }
  .tab{
    flex:1;border:none;background:none;padding:10px 4px 14px;
    font-family:inherit;font-size:11px;color:var(--sub);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:3px;font-weight:600;
  }
  .tab .ico{font-size:22px;line-height:1}
  .tab.on{color:var(--red)}
  .tab.on .ico{transform:translateY(-1px)}

  .view{display:none;padding-top:8px}
  .view.on{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .empty{text-align:center;color:var(--sub);padding:60px 20px;font-size:15px}
  .empty .big{font-size:40px;margin-bottom:8px}

  /* ── 대시보드 히어로 ── */
  .today-label{font-size:13px;color:var(--sub);font-weight:700;margin:18px 2px 8px}
  .hero{
    border-radius:22px;padding:22px;color:#fff;box-shadow:var(--shadow);
    background:linear-gradient(135deg,#e0533d,#e0803d);
  }
  .hero.calm{background:linear-gradient(135deg,#2f9e6a,#3d9e8e)}
  .hero .status{font-size:13px;font-weight:700;opacity:.9;letter-spacing:.3px}
  .hero .dday{font-size:44px;font-weight:900;letter-spacing:-1px;line-height:1.05;margin:2px 0 4px}
  .hero .vac{font-size:18px;font-weight:800}
  .hero .meta{font-size:13px;opacity:.92;margin-top:8px;line-height:1.6}
  .hero .chip{
    display:inline-block;background:rgba(255,255,255,.22);border-radius:999px;
    padding:3px 10px;font-size:12px;font-weight:700;margin:6px 6px 0 0;
  }

  /* ── 다가오는 접종 목록 ── */
  .sec-title{font-size:13px;color:var(--sub);font-weight:700;margin:22px 2px 8px}
  .up-card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:12px;
    box-shadow:0 1px 2px rgba(80,60,30,.05);
  }
  .up-dday{
    font-size:12px;font-weight:800;min-width:52px;text-align:center;
    padding:6px 4px;border-radius:10px;background:var(--paper);color:var(--sub);
  }
  .up-dday.soon{background:var(--red-soft);color:var(--red)}
  .up-name{flex:1;font-size:15px;font-weight:700}
  .up-name small{display:block;font-size:12px;color:var(--sub);font-weight:600;margin-top:1px}
  .up-date{font-size:12px;color:var(--sub);text-align:right;white-space:nowrap;font-weight:600}

  /* ── 배지 ── */
  .badge{display:inline-block;font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px}
  .badge.req{background:var(--red-soft);color:var(--red)}
  .badge.opt{background:var(--blue-soft);color:var(--blue)}
  .badge.free{background:#e2f3ea;color:var(--green)}
  .badge.done{background:#e2f3ea;color:var(--green)}

  /* ── 전체 일정표 (아코디언) ── */
  .grp{
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    margin-bottom:10px;overflow:hidden;box-shadow:0 1px 2px rgba(80,60,30,.05);
  }
  .grp-head{
    padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;
    user-select:none;
  }
  .grp-age{font-size:15px;font-weight:800}
  .grp-count{font-size:12px;color:var(--sub);font-weight:700}
  .grp-arrow{margin-left:auto;color:var(--sub);transition:transform .2s;font-size:13px}
  .grp.open .grp-arrow{transform:rotate(180deg)}
  .grp-body{display:none;border-top:1px solid var(--line)}
  .grp.open .grp-body{display:block}
  .row{padding:12px 16px;border-bottom:1px solid var(--paper)}
  .row:last-child{border-bottom:none}
  .row-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .row-name{font-size:15px;font-weight:700}
  .row-dose{font-size:12px;color:var(--sub);font-weight:700}
  .row-info{font-size:12.5px;color:var(--sub);margin-top:6px;line-height:1.7}
  .row-info b{color:var(--ink);font-weight:700}
  .row-desc{font-size:13px;color:var(--ink);margin-top:7px;line-height:1.65;
    background:var(--amber-soft);border-radius:10px;padding:9px 11px}
  .hero-desc{font-size:13px;opacity:.94;margin-top:8px;line-height:1.6;
    background:rgba(255,255,255,.16);border-radius:12px;padding:9px 12px}

  /* ── 택1 비교 카드 ── */
  .cmp{margin-top:10px;border:1.5px solid var(--amber);border-radius:14px;
    background:var(--amber-soft);padding:12px 13px}
  .cmp-title{font-size:13.5px;font-weight:800;color:#b5731a}
  .cmp-note{font-size:12px;color:var(--sub);font-weight:600;margin:3px 0 9px}
  .cmp-table{background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--line)}
  .cmp-row{display:grid;grid-template-columns:1fr 1.1fr 1.1fr;font-size:12px;
    border-bottom:1px solid var(--paper)}
  .cmp-row:last-child{border-bottom:none}
  .cmp-row>div{padding:7px 8px;line-height:1.4}
  .cmp-row>div+div{border-left:1px solid var(--paper)}
  .cmp-head{background:var(--paper);font-weight:800}
  .cmp-lbl{color:var(--sub);font-weight:700}
  .cmp-tip{font-size:12px;color:var(--ink);margin-top:9px;line-height:1.6;font-weight:600}
  .row-date{font-size:12px;font-weight:800;color:var(--amber);margin-top:4px}
  .row-actions{margin-top:8px}
  .mini-btn{
    border:1.5px solid var(--line);background:var(--card);color:var(--ink);
    font-family:inherit;font-size:12px;font-weight:700;padding:5px 12px;
    border-radius:999px;cursor:pointer;
  }
  .mini-btn.done{background:#e2f3ea;border-color:#bfe4d0;color:var(--green)}

  /* ── 기록 탭 ── */
  .rec-item{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 2px rgba(80,60,30,.05);
  }
  .rec-top{display:flex;align-items:center;gap:8px}
  .rec-name{font-size:15px;font-weight:800;flex:1}
  .rec-date{font-size:12px;color:var(--sub);font-weight:700}
  .rec-fields{margin-top:10px;display:grid;gap:8px}
  .rec-fields input{
    border:1.5px solid var(--line);border-radius:10px;padding:8px 10px;
    font-size:13px;font-family:inherit;background:var(--paper);color:var(--ink);width:100%;
  }
  .rec-fields input:focus{outline:none;border-color:var(--amber)}
  .undo{
    background:none;border:none;color:var(--sub);font-size:12px;font-weight:700;
    text-decoration:underline;cursor:pointer;font-family:inherit;padding:0;margin-top:8px;
  }

  /* ── 공유 버튼 ── */
  .share{
    display:flex;gap:8px;margin:16px 0 4px;
  }
  .share button{
    flex:1;border:none;border-radius:14px;padding:13px;font-family:inherit;
    font-size:14px;font-weight:800;cursor:pointer;box-shadow:var(--shadow);
  }
  .share .save{background:var(--red);color:#fff}

  .foot{text-align:center;font-size:11px;color:var(--sub);padding:24px 20px 8px;line-height:1.7}
  .legend{display:flex;justify-content:center;gap:14px;margin:6px 0 2px;flex-wrap:wrap}
  .legend span{font-size:11px;color:var(--sub);font-weight:700}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;vertical-align:1px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">우리 아기 예방접종 <span class="heart">♥</span></div>
    <div class="madeby">🛠 <b>남편이 만든</b> 접종 계산기 · 2026 표준일정</div>
  </header>

  <div class="birth">
    <label>👶 출생일</label>
    <input type="date" id="birth">
  </div>

  <!-- 대시보드 -->
  <section class="view on" id="v-home">
    <div id="home-body"></div>
  </section>

  <!-- 전체 일정표 -->
  <section class="view" id="v-all">
    <div class="share">
      <button class="save" onclick="window.print()">🖨 전체 일정 저장 / 인쇄</button>
    </div>
    <div class="legend">
      <span><span class="dot" style="background:var(--red)"></span>필수</span>
      <span><span class="dot" style="background:var(--blue)"></span>선택</span>
      <span><span class="dot" style="background:var(--green)"></span>무료</span>
    </div>
    <div id="all-body"></div>
  </section>

  <!-- 기록 -->
  <section class="view" id="v-rec">
    <div id="rec-body"></div>
  </section>

  <div class="foot">
    ※ 표준 일정 기준 자동 계산이에요. 실제 접종은 아기 상태에 따라 소아과 선생님과 상의하세요.<br>
    질병관리청 예방접종도우미 기준 · 개인정보는 이 기기에만 저장돼요
  </div>
</div>

<!-- 하단 탭 -->
<nav class="tabs">
  <button class="tab on" data-v="home"><span class="ico">🏠</span>오늘 할일</button>
  <button class="tab" data-v="all"><span class="ico">📅</span>전체 일정</button>
  <button class="tab" data-v="rec"><span class="ico">📝</span>접종 기록</button>
</nav>

 ["인플루엔자(독감)","매년","생후 6개월~ 매년",6*M,true,true,"무료(어린이)","주사","다른 백신과 동시 가능"],

 "결핵 BCG":"결핵을 예방하는 백신이에요. 특히 아기가 걸리면 위험한 '결핵성 뇌수막염'을 막아줘요. 태어나서 가장 먼저 맞는 접종 중 하나예요.",
 "B형간염":"간에 염증을 일으켜 나중에 간경화·간암으로 이어질 수 있는 B형간염 바이러스를 막아줘요. 엄마가 보균자면 아기에게 옮을 수 있어 출생 직후부터 맞아요.",
 "디프테리아":"디프테리아(목), 파상풍(상처 감염), 백일해(심한 기침) 세 가지를 한 번에 예방하는 백신이에요. 백일해는 어린 아기에게 특히 위험해서 꼭 챙겨야 해요.",
 "폴리오 IPV":"소아마비(폴리오)를 예방해요. 걸리면 팔다리가 마비될 수 있는 병인데, 백신 덕분에 우리나라에선 거의 사라졌어요. DTaP와 같이 맞는 경우가 많아요.",
 "b형헤모필루스 Hib":"Hib라는 세균이 일으키는 뇌수막염·후두염을 막아줘요. 이름이 어렵지만 어린 아기 뇌수막염의 흔한 원인이라 중요한 접종이에요.",
 "폐렴구균 PCV13":"폐렴구균이 일으키는 폐렴·중이염·뇌수막염을 예방해요. PCV13은 13가지 균을 막아주는 국가필수 백신이에요.",
 "로타바이러스":"영유아 설사·구토의 가장 흔한 원인인 로타바이러스를 막아줘요. 주사가 아니라 입으로 먹이는(경구) 백신이라 아기가 덜 힘들어해요.",
 "MMR":"홍역·유행성이하선염(볼거리)·풍진 세 가지를 한 번에 예방해요. 홍역은 전염력이 아주 강해서 돌 무렵 꼭 맞아야 하는 접종이에요.",
 "수두":"수두(물집·발진)를 예방해요. 걸리면 온몸에 가려운 물집이 생기고 흉터가 남을 수 있어요. 돌 무렵 1회 맞아요.",
 "A형간염":"오염된 음식·물로 옮는 A형간염을 예방해요. 6개월 간격으로 2번 맞아야 효과가 오래가요.",
 "일본뇌염":"모기가 옮기는 일본뇌염을 예방해요. 드물지만 걸리면 뇌에 심한 후유증이 남을 수 있어요. 사백신과 생백신 중 택1이에요(아래 비교 참고).",
 "인플루엔자":"매년 유행하는 독감(인플루엔자)을 예방해요. 바이러스가 매년 바뀌어서 생후 6개월부터 해마다 맞아야 해요.",
 "수막구균":"수막구균성 뇌수막염을 예방하는 선택 접종이에요. 드물지만 진행이 매우 빨라 위험해서, 단체생활을 일찍 시작하는 아기에게 권하기도 해요.",
 "사람유두종바이러스 HPV":"자궁경부암 등을 일으키는 HPV 바이러스를 예방해요. 만 12세 여아는 국가지원으로 무료예요. 감염 전에 맞아야 효과가 커요.",
 "대상포진":"어릴 때 앓은 수두 바이러스가 몸에 남아 있다가 면역이 떨어지면 재발하는 병이에요. 주로 50세 이상 부모·조부모용 접종이에요.",
};
function infoFor(name){
  for(const k in INFO){ if(name.startsWith(k)) return INFO[k]; }
  return "";
}

/* ─────────────────────────────────────────
   택1(선택 갈림길) 비교 카드
   ───────────────────────────────────────── */
const COMPARE=[
 {
   match:"로타바이러스",
   title:"로타바이러스 — 둘 중 하나만 선택",
   note:"두 제품 중 한 가지로 처음부터 끝까지 맞아요. 섞어서 맞지 않아요.",
   cols:["로타릭스","로타텍"],
   rows:[
     ["접종 횟수","2회 (2·4개월)","3회 (2·4·6개월)"],
     ["예방 범위","가장 흔한 유형 중심","좀 더 여러 유형"],
     ["병원 방문","한 번 덜 감","한 번 더 감"],
     ["비용","둘 다 국가필수 무료","둘 다 국가필수 무료"],
   ],
   tip:"둘 다 효과·안전성은 비슷해요. 병원에서 주로 쓰는 제품으로 맞추면 되고, 한 번 시작한 제품으로 끝까지 맞는 게 원칙이에요."
 },
 {
   match:"일본뇌염",
   title:"일본뇌염 — 사백신 vs 생백신 택1",
   note:"둘 중 한 가지 방식을 골라요. 접종 횟수와 일정이 달라요.",
   cols:["불활성화(사백신)","약독화(생백신)"],
   rows:[
     ["총 횟수","5회","2회"],
     ["일정","12개월부터 여러 번","12개월·24개월 2번"],
     ["방문 횟수","많음","적음"],
     ["특징","오래 쓰인 방식","횟수가 적어 편함"],
   ],
   tip:"둘 다 국가필수(무료)예요. 이 앱은 '사백신(5회)' 기준으로 날짜를 계산했어요. 생백신(2회)으로 하려면 소아과에서 일정을 다시 잡아주세요."
 },
 {
   match:"결핵 BCG",
   title:"BCG — 피내용 vs 경피용",
   note:"접종 방법이 두 가지예요. 예방 효과는 비슷해요.",
   cols:["피내용(주사)","경피용(도장)"],
   rows:[
     ["방법","피부 속 주사","도장처럼 눌러 찍음"],
     ["비용","무료","약 7만원 안팎 (유료)"],
     ["자국","작은 흉터 1개","점 여러 개 자국"],
     ["접종 장소","보건소·일부 병원","소아과 등"],
   ],
   tip:"효과 차이는 크지 않아요. 무료를 원하면 피내용(보건소), 흉터를 덜 남기고 싶으면 경피용을 선택하는 경우가 많아요."
 },
];

/* ── 상태 ── */
let birth=null;
let done=JSON.parse(localStorage.getItem('vax_done')||'{}');
let recs=JSON.parse(localStorage.getItem('vax_recs')||'{}');
const saved=localStorage.getItem('vax_birth');
if(saved){birth=new Date(saved);document.getElementById('birth').value=saved;}

const $=s=>document.querySelector(s);
const key=(i)=>VAX[i][0]+'|'+VAX[i][1];

function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+Math.round(n));return x;}
function fmt(d){return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}
function fmtShort(d){const w=['일','월','화','수','목','금','토'][d.getDay()];return `${d.getMonth()+1}/${d.getDate()}(${w})`;}
function daysBetween(a,b){return Math.round((a-b)/(1000*60*60*24));}

/* ── 연령대 그룹핑 ── */
function ageGroup(off){
  const m=off/M;
  if(m<1) return "0~1개월";
  if(m<2) return "1개월";
  if(m<4) return "2개월";
  if(m<6) return "4개월";
  if(m<12) return "6개월";
  if(m<15) return "12~15개월";
  if(m<24) return "15~23개월";
  if(m<48) return "돌 이후";
  if(m<108) return "만 4~6세";
  return "만 6세 이상";
}
const GROUP_ORDER=["0~1개월","1개월","2개월","4개월","6개월","12~15개월","15~23개월","돌 이후","만 4~6세","만 6세 이상"];

/* ── 택1 비교 카드 렌더 ── */
function compareCard(c){
  const head=`<div class="cmp-row cmp-head"><div class="cmp-lbl"></div><div>${c.cols[0]}</div><div>${c.cols[1]}</div></div>`;
  const body=c.rows.map(r=>`<div class="cmp-row"><div class="cmp-lbl">${r[0]}</div><div>${r[1]}</div><div>${r[2]}</div></div>`).join('');
  return `<div class="cmp">
    <div class="cmp-title">⚖️ ${c.title}</div>
    <div class="cmp-note">${c.note}</div>
    <div class="cmp-table">${head}${body}</div>
    <div class="cmp-tip">👉 ${c.tip}</div>
  </div>`;
}


/* ── 렌더 ── */
function render(){
  renderHome();renderAll();renderRec();
}

function renderHome(){
  const el=$('#home-body');
  if(!birth){
    el.innerHTML=`<div class="empty"><div class="big">👆</div>출생일을 입력하면<br>오늘 할 일이 딱 보여요</div>`;
    return;
  }
  const today=new Date();today.setHours(0,0,0,0);
  // 아직 안 맞은 접종만, D-Day 순 정렬
  const list=VAX.map((v,i)=>({i,v,date:addDays(birth,v[3]),dd:daysBetween(addDays(birth,v[3]),today)}))
    .filter(o=>!done[key(o.i)])
    .sort((a,b)=>a.dd-b.dd);
  // 히어로: 지났거나 임박한 필수 접종 우선
  const next=list.find(o=>o.v[4]) || list[0];
  let hero='';
  if(!next){
    hero=`<div class="hero calm"><div class="status">🎉 완료</div><div class="vac" style="font-size:22px;margin-top:6px">모든 접종을 다 챙겼어요!</div><div class="meta">기록 탭에서 지난 접종을 확인할 수 있어요.</div></div>`;
  }else{
    const dd=next.dd;
    let statusTxt,ddTxt,calm='';
    if(dd<0){statusTxt='⚠️ 지난 접종이 있어요';ddTxt=`+${Math.abs(dd)}일 지남`;}
    else if(dd===0){statusTxt='🔔 바로 오늘이에요!';ddTxt='D-DAY';}
    else if(dd<=7){statusTxt='🔔 곧 접종일 (D-7 알림)';ddTxt=`D-${dd}`;}
    else{statusTxt='다음 접종까지';ddTxt=`D-${dd}`;calm='calm';}
    hero=`<div class="hero ${calm}">
      <div class="status">${statusTxt}</div>
      <div class="dday">${ddTxt}</div>
      <div class="vac">${next.v[0]} <span style="opacity:.85;font-weight:600">${next.v[1]}</span></div>
      <div class="hero-desc">${infoFor(next.v[0])}</div>
      <div class="meta">📆 ${fmt(next.date)} · ${next.v[2]}<br>${next.v[8]}</div>
      <div>
        <span class="chip">${next.v[4]?'필수':'선택'}</span>
        <span class="chip">${next.v[5]?'무료':'유료 '+next.v[6]}</span>
        <span class="chip">${next.v[7]}</span>
      </div>
    </div>`;
  }

  // 다가오는 목록 (다음 5개)
  const upcoming=list.filter(o=>o!==next).slice(0,5);
  let up='';
  if(upcoming.length){
    up=`<div class="sec-title">다가오는 접종</div>`+upcoming.map(o=>{
      const soon=o.dd<=7?'soon':'';
      const ddt=o.dd<0?`+${Math.abs(o.dd)}일`:(o.dd===0?'오늘':`D-${o.dd}`);
      return `<div class="up-card">
        <div class="up-dday ${soon}">${ddt}</div>
        <div class="up-name">${o.v[0]}<small>${o.v[1]} · ${o.v[8]}</small></div>
        <div class="up-date">${fmtShort(o.date)}</div>
      </div>`;
    }).join('');
  }

  el.innerHTML=`<div class="today-label">오늘 할 일</div>${hero}${up}`;
}

function renderAll(){
  const el=$('#all-body');
  if(!birth){
    el.innerHTML=`<div class="empty"><div class="big">📅</div>출생일을 입력하면<br>전체 일정이 자동으로 짜여요</div>`;
    return;
  }
  const today=new Date();today.setHours(0,0,0,0);
  const groups={};
  VAX.forEach((v,i)=>{
    const g=ageGroup(v[3]);
    (groups[g]=groups[g]||[]).push({i,v,date:addDays(birth,v[3])});
  });
  el.innerHTML=GROUP_ORDER.filter(g=>groups[g]).map((g,gi)=>{
    const items=groups[g];
    const openAttr=gi<=1?'open':''; // 앞 그룹 자동 펼침
    const doneCnt=items.filter(o=>done[key(o.i)]).length;
    const rows=items.map(o=>{
      const isDone=done[key(o.i)];
      const reqBadge=o.v[4]?'<span class="badge req">필수</span>':'<span class="badge opt">선택</span>';
      const freeBadge=o.v[5]?'<span class="badge free">무료</span>':'';
      const doneBadge=isDone?'<span class="badge done">✓ 완료</span>':'';
      const desc=infoFor(o.v[0]);
      // 이 접종에 해당하는 비교 카드 (1차/1회일 때만 1번 표시)
      const cmp=COMPARE.find(c=>o.v[0].startsWith(c.match));
      const firstDose=o.v[1].startsWith('1차')||o.v[1]==='매년';
      const cmpHtml=(cmp&&firstDose)?compareCard(cmp):'';
      const descHtml=desc?`<div class="row-desc">💬 ${desc}</div>`:'';
      return `<div class="row">
        <div class="row-top">
          <span class="row-name">${o.v[0]}</span>
          <span class="row-dose">${o.v[1]}</span>
          ${reqBadge}${freeBadge}${doneBadge}
        </div>
        <div class="row-date">📆 ${fmt(o.date)} · ${o.v[2]}</div>
        ${descHtml}
        <div class="row-info">
          💉 <b>${o.v[7]}</b> · 💰 ${o.v[6]}<br>
          🤝 ${o.v[8]}
        </div>
        ${cmpHtml}
        <div class="row-actions">
          <button class="mini-btn ${isDone?'done':''}" onclick="toggleDone(${o.i})">
            ${isDone?'✓ 접종 완료됨':'접종 완료로 표시'}
          </button>
        </div>
      </div>`;
    }).join('');
    return `<div class="grp ${openAttr}">
      <div class="grp-head" onclick="this.parentElement.classList.toggle('open')">
        <span class="grp-age">${g}</span>
        <span class="grp-count">접종 ${items.length}개${doneCnt?` · 완료 ${doneCnt}`:''}</span>
        <span class="grp-arrow">▼</span>
      </div>
      <div class="grp-body">${rows}</div>
    </div>`;
  }).join('');
}

function renderRec(){
  const el=$('#rec-body');
  const doneList=VAX.map((v,i)=>({i,v})).filter(o=>done[key(o.i)]);
  if(!doneList.length){
    el.innerHTML=`<div class="empty"><div class="big">📝</div>완료한 접종이 없어요<br><span style="font-size:13px">전체 일정 탭에서 '접종 완료'를 누르면<br>여기에 기록장이 생겨요</span></div>`;
    return;
  }
  el.innerHTML=`<div class="sec-title" style="margin-top:18px">소아과 갈 때 보여주세요 · 접종 기록장</div>`+
   doneList.map(o=>{
    const k=key(o.i);const r=recs[k]||{};
    return `<div class="rec-item">
      <div class="rec-top">
        <span class="rec-name">${o.v[0]}</span>
        <span class="rec-date">${o.v[1]}</span>
      </div>
      <div class="rec-fields">
        <input placeholder="📆 맞은 날짜 (예: 2026.03.14)" value="${r.date||''}" onchange="saveRec('${k}','date',this.value)">
        <input placeholder="🏥 병원 이름" value="${r.hosp||''}" onchange="saveRec('${k}','hosp',this.value)">
        <input placeholder="📌 부작용·특이사항 메모 (없으면 비워두세요)" value="${r.memo||''}" onchange="saveRec('${k}','memo',this.value)">
      </div>
      <button class="undo" onclick="toggleDone(${o.i})">완료 취소</button>
    </div>`;
  }).join('');
}

/* ── 이벤트 ── */
function toggleDone(i){
  const k=key(i);
  if(done[k])delete done[k];else done[k]=true;
  localStorage.setItem('vax_done',JSON.stringify(done));
  render();
}
function saveRec(k,f,val){
  recs[k]=recs[k]||{};recs[k][f]=val;
  localStorage.setItem('vax_recs',JSON.stringify(recs));
}
$('#birth').addEventListener('change',e=>{
  if(e.target.value){birth=new Date(e.target.value);localStorage.setItem('vax_birth',e.target.value);}
  else{birth=null;localStorage.removeItem('vax_birth');}
  render();
});
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
    $('#v-'+t.dataset.v).classList.add('on');
    window.scrollTo({top:0,behavior:'smooth'});
  });
});
function shareKakao(){/* removed */}

render();
</script>
</body>
</html>
